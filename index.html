<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>С 8 марта, Ксюшенька! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "🌸🌼🌺🌸🌼🌺";
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            font-size: 40px;
            opacity: 0.2;
            white-space: nowrap;
            overflow: hidden;
            pointer-events: none;
            transform: rotate(-5deg);
        }

        .container {
            max-width: 700px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px 50px 30px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 2px #fff inset;
            padding: 30px 20px 20px;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.7);
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #c2185b;
            text-align: center;
            margin: 0 0 10px;
            text-shadow: 3px 3px 0 #ffe0f0;
            letter-spacing: 2px;
            word-break: break-word;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #880e4f;
            margin-bottom: 20px;
            font-weight: 600;
            background: rgba(255,255,240,0.7);
            padding: 8px 15px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(5px);
        }

        .progress {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0 20px;
            flex-wrap: wrap;
        }

        .flower {
            font-size: 32px;
            color: #f06292;
            opacity: 0.4;
            transition: all 0.3s ease;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        .flower.completed {
            opacity: 1;
            color: #ec407a;
            transform: scale(1.2);
            text-shadow: 0 0 10px #ffb6c1;
        }

        .game-area {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 20px 15px;
            margin: 20px 0;
            border: 2px dashed #f48fb1;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .final-message {
            display: none;
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 60px;
            font-size: 1.8rem;
            line-height: 1.4;
            color: #ad1457;
            font-weight: 700;
            margin: 20px 0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .final-message i {
            font-size: 3rem;
            display: block;
            margin-bottom: 15px;
            color: #d81b60;
        }

        .signature {
            text-align: center;
            font-size: 1.8rem;
            font-family: 'Pacifico', cursive;
            color: #b03a5e;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(255,255,255,0.6);
            text-shadow: 2px 2px 0 #ffe0f0;
        }

        .signature i {
            font-size: 1.5rem;
            margin: 0 5px;
        }

        button {
            background: #fce4ec;
            border: 3px solid white;
            border-radius: 60px;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #b03a5e;
            box-shadow: 0 10px 0 #e6a0b5, 0 6px 20px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: 'Quicksand', sans-serif;
            margin: 10px 5px;
            min-width: 160px;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(7px);
            box-shadow: 0 3px 0 #e6a0b5, 0 6px 20px rgba(0,0,0,0.1);
        }

        /* Игра 1: Бабочка */
        .butterfly-container {
            position: relative;
            width: 100%;
            height: 280px;
            background: rgba(255,240,245,0.7);
            border-radius: 30px;
            overflow: hidden;
            border: 3px solid white;
            margin-bottom: 20px;
        }

        .butterfly {
            position: absolute;
            font-size: 48px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
            filter: drop-shadow(0 6px 6px rgba(0,0,0,0.2));
            z-index: 5;
            left: 0;
            top: 0;
        }

        .butterfly:active {
            transform: scale(0.8);
        }

        /* Игра 2: Саймон (3 раунда) */
        .simon-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 300px;
            margin: 10px auto;
        }

        .simon-btn {
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            border: 5px solid white;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            transition: 0.1s;
            cursor: pointer;
        }

        .simon-btn.red { background: #f44336; }
        .simon-btn.green { background: #4caf50; }
        .simon-btn.blue { background: #2196f3; }
        .simon-btn.yellow { background: #ffeb3b; }

        .simon-btn.active {
            filter: brightness(1.5);
            transform: scale(0.95);
            box-shadow: 0 0 20px white;
        }

        /* Игра 3: Ползунок (ускоренный) */
        .slider-target {
            width: 100%;
            max-width: 400px;
            height: 30px;
            background: linear-gradient(90deg, #f8bbd0, #f06292, #c2185b, #f06292, #f8bbd0);
            border-radius: 30px;
            margin: 30px 0;
            border: 3px solid white;
            position: relative;
        }

        .target-zone {
            position: absolute;
            width: 20%;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            left: 40%;
            border-left: 4px solid #00c853;
            border-right: 4px solid #00c853;
            box-shadow: 0 0 15px #69f0ae;
            pointer-events: none;
        }

        input[type=range] {
            width: 100%;
            max-width: 400px;
            margin: 15px 0;
            -webkit-appearance: none;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            border: 3px solid #d81b60;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            margin-top: -12px;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 16px;
            background: #f8bbd0;
            border-radius: 30px;
            border: 2px solid white;
        }

        /* Игра 4: Струп-тест */
        .stroop-colors {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .color-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 8px 0 #b0bec5;
            cursor: pointer;
            transition: 0.1s;
        }

        .color-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #b0bec5;
        }

        .color-btn.red { background: #f44336; }
        .color-btn.green { background: #4caf50; }
        .color-btn.blue { background: #2196f3; }
        .color-btn.yellow { background: #ffeb3b; }

        .stroop-word {
            font-size: 3rem;
            font-weight: 800;
            margin: 15px 0;
            text-shadow: 2px 2px 0 white;
        }

        /* Игра 5: Найди пару 5x4 (20 карт) */
        .memory-grid-5x4 {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
        }

        .card {
            aspect-ratio: 1 / 1;
            background: #f8bbd0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 4px solid white;
            box-shadow: 0 6px 0 #e6a0b5;
            cursor: pointer;
            transition: 0.2s;
            color: transparent;
            user-select: none;
        }

        .card.flipped {
            background: #fff5f8;
            color: #d81b60;
            box-shadow: 0 2px 0 #e6a0b5;
            transform: translateY(4px);
        }

        .card.matched {
            background: #c8e6c9;
            color: #2e7d32;
            box-shadow: 0 2px 0 #81c784;
            cursor: default;
            transform: translateY(4px);
            border-color: #a5d6a7;
        }

        .game-info {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ad1457;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.6);
            padding: 8px 20px;
            border-radius: 40px;
        }

        .message {
            font-size: 1.2rem;
            color: #b03a5e;
            margin-top: 15px;
            min-height: 2em;
            font-weight: 600;
        }

        @media (max-width: 500px) {
            h1 { font-size: 2rem; }
            .game-area { padding: 15px 10px; }
            .butterfly-container { height: 220px; }
            .butterfly { font-size: 40px; }
            .card { font-size: 1.6rem; }
            .memory-grid-5x4 { gap: 5px; }
            .stroop-word { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 С 8 марта, Ксюшенька! 🌸</h1>
        <div class="subtitle">Твои праздничные мини-игры</div>

        <div class="progress" id="progress">
            <span class="flower" id="flower1">🌷</span>
            <span class="flower" id="flower2">🌼</span>
            <span class="flower" id="flower3">🌸</span>
            <span class="flower" id="flower4">🌺</span>
            <span class="flower" id="flower5">🌹</span>
        </div>

        <div id="gameArea" class="game-area"></div>

        <div id="finalMessage" class="final-message">
            <i class="fas fa-heart"></i>
            ты молодечик!!!! я тебя таккк люблюююю, такая умничка, шок вообще, я бы сам не прошёл)))
        </div>

        <div class="signature">
            <i class="fas fa-feather-alt"></i> от твоего никити <i class="fas fa-infinity"></i>
        </div>
    </div>

    <script>
        (function() {
            let currentGame = 0;
            const gamesCompleted = [false, false, false, false, false];
            const flowers = [
                document.getElementById('flower1'),
                document.getElementById('flower2'),
                document.getElementById('flower3'),
                document.getElementById('flower4'),
                document.getElementById('flower5')
            ];
            const gameArea = document.getElementById('gameArea');
            const finalMessageDiv = document.getElementById('finalMessage');

            let isTransitioning = false;

            function updateProgress() {
                gamesCompleted.forEach((done, idx) => {
                    if (done) flowers[idx].classList.add('completed');
                    else flowers[idx].classList.remove('completed');
                });
            }

            function nextGame() {
                if (isTransitioning) return;
                isTransitioning = true;

                if (currentGame < 4) {
                    currentGame++;
                    loadGame(currentGame);
                } else {
                    gameArea.style.display = 'none';
                    finalMessageDiv.style.display = 'block';
                }
                updateProgress();

                setTimeout(() => { isTransitioning = false; }, 500);
            }

            function clearGameArea() {
                gameArea.innerHTML = '';
                gameArea.style.display = 'flex';
                finalMessageDiv.style.display = 'none';
            }

            function loadGame(index) {
                clearGameArea();
                if (index === 0) loadGame1();
                else if (index === 1) loadGame2();
                else if (index === 2) loadGame3();
                else if (index === 3) loadGame4();
                else if (index === 4) loadGame5();
            }

            // ИГРА 1: Бабочка
            function loadGame1() {
                let hits = 0;
                let interval;
                let gameFinished = false;

                const container = document.createElement('div');
                container.className = 'butterfly-container';

                const butterfly = document.createElement('div');
                butterfly.className = 'butterfly';
                butterfly.textContent = '🦋';
                butterfly.style.left = Math.random() * 80 + '%';
                butterfly.style.top = Math.random() * 80 + '%';

                const info = document.createElement('div');
                info.className = 'game-info';
                info.textContent = `Поймай бабочку 5 раз: ${hits}/5`;

                const message = document.createElement('div');
                message.className = 'message';

                function moveButterfly() {
                    if (gameFinished) return;
                    const maxX = container.clientWidth - butterfly.clientWidth;
                    const maxY = container.clientHeight - butterfly.clientHeight;
                    if (maxX > 0 && maxY > 0) {
                        butterfly.style.left = Math.random() * maxX + 'px';
                        butterfly.style.top = Math.random() * maxY + 'px';
                    }
                }

                function startMoving() {
                    if (interval) clearInterval(interval);
                    interval = setInterval(moveButterfly, 400);
                }

                function handleClick(e) {
                    if (gameFinished) return;
                    e.stopPropagation();
                    hits++;
                    info.textContent = `Поймай бабочку 5 раз: ${hits}/5`;
                    if (hits >= 5) {
                        gameFinished = true;
                        clearInterval(interval);
                        butterfly.removeEventListener('click', handleClick);
                        gamesCompleted[0] = true;
                        message.innerHTML = '🎉 Ура! Бабочка поймана!';
                        setTimeout(() => nextGame(), 1000);
                    } else {
                        moveButterfly();
                    }
                }

                butterfly.addEventListener('click', handleClick);
                container.appendChild(butterfly);
                gameArea.appendChild(info);
                gameArea.appendChild(container);
                gameArea.appendChild(message);

                startMoving();
                window.addEventListener('resize', moveButterfly);
            }

            // ИГРА 2: Саймон (3 раунда)
            function loadGame2() {
                const colors = ['red', 'green', 'blue', 'yellow'];
                const rounds = [
                    { length: 3, sequence: [] },
                    { length: 4, sequence: [] },
                    { length: 5, sequence: [] }
                ];
                rounds.forEach(r => {
                    for (let i = 0; i < r.length; i++) {
                        r.sequence.push(colors[Math.floor(Math.random() * colors.length)]);
                    }
                });

                let currentRound = 0;
                let playerTurn = false;
                let playerIndex = 0;
                let gameFinished = false;

                const info = document.createElement('div');
                info.className = 'game-info';
                info.textContent = `Раунд 1: запомни ${rounds[0].length} цветов`;

                const message = document.createElement('div');
                message.className = 'message';

                const grid = document.createElement('div');
                grid.className = 'simon-grid';

                const buttons = {};
                colors.forEach(color => {
                    const btn = document.createElement('div');
                    btn.className = `simon-btn ${color}`;
                    btn.dataset.color = color;
                    btn.addEventListener('click', () => {
                        if (gameFinished || !playerTurn) return;
                        if (color === rounds[currentRound].sequence[playerIndex]) {
                            btn.classList.add('active');
                            setTimeout(() => btn.classList.remove('active'), 200);
                            playerIndex++;
                            if (playerIndex === rounds[currentRound].sequence.length) {
                                playerTurn = false;
                                if (currentRound === 2) {
                                    gameFinished = true;
                                    gamesCompleted[1] = true;
                                    message.innerHTML = '✅ Ты справилась со всеми раундами!';
                                    setTimeout(() => nextGame(), 1000);
                                } else {
                                    currentRound++;
                                    playerIndex = 0;
                                    info.textContent = `Раунд ${currentRound+1}: запомни ${rounds[currentRound].length} цветов`;
                                    message.innerHTML = 'Отлично! Следующий раунд...';
                                    setTimeout(() => startRound(), 1500);
                                }
                            }
                        } else {
                            if (gameFinished) return;
                            message.innerHTML = '❌ Ошибка, начни раунд заново';
                            playerTurn = false;
                            setTimeout(() => startRound(), 1000);
                        }
                    });
                    grid.appendChild(btn);
                    buttons[color] = btn;
                });

                function showSequence() {
                    let i = 0;
                    function next() {
                        if (gameFinished) return;
                        if (i < rounds[currentRound].sequence.length) {
                            const color = rounds[currentRound].sequence[i];
                            buttons[color].classList.add('active');
                            setTimeout(() => {
                                buttons[color].classList.remove('active');
                                i++;
                                setTimeout(next, 300);
                            }, 500);
                        } else {
                            playerTurn = true;
                            playerIndex = 0;
                            message.innerHTML = 'Твой ход!';
                        }
                    }
                    next();
                }

                function startRound() {
                    if (gameFinished) return;
                    playerTurn = false;
                    message.innerHTML = 'Смотри внимательно...';
                    setTimeout(showSequence, 500);
                }

                gameArea.appendChild(info);
                gameArea.appendChild(grid);
                gameArea.appendChild(message);
                startRound();
            }

            // ИГРА 3: Ползунок
            function loadGame3() {
                let moveInterval;
                let gameFinished = false;
                let slider = document.createElement('input');
                slider.type = 'range';
                slider.min = 0;
                slider.max = 100;
                slider.value = 50;
                slider.step = 1;

                const targetDiv = document.createElement('div');
                targetDiv.className = 'slider-target';
                const zone = document.createElement('div');
                zone.className = 'target-zone';
                targetDiv.appendChild(zone);

                const info = document.createElement('div');
                info.className = 'game-info';
                info.textContent = 'Останови бегунок в зелёной зоне';

                const message = document.createElement('div');
                message.className = 'message';

                const stopBtn = document.createElement('button');
                stopBtn.textContent = 'СТОП';

                let direction = 1;
                const speed = 3.0;

                function moveSlider() {
                    if (gameFinished) return;
                    let val = parseFloat(slider.value);
                    val += direction * speed;
                    if (val >= 100) { val = 100; direction = -1; }
                    if (val <= 0) { val = 0; direction = 1; }
                    slider.value = val;
                }

                function startMoving() {
                    if (moveInterval) clearInterval(moveInterval);
                    moveInterval = setInterval(moveSlider, 20);
                }

                stopBtn.addEventListener('click', () => {
                    if (gameFinished) return;
                    clearInterval(moveInterval);
                    const val = parseFloat(slider.value);
                    if (val >= 40 && val <= 60) {
                        gameFinished = true;
                        gamesCompleted[2] = true;
                        message.innerHTML = '🎯 Точно в цель! Молодец!';
                        setTimeout(() => nextGame(), 1000);
                    } else {
                        message.innerHTML = '😅 Чуть-чуть не попала... Пробуй ещё!';
                        startMoving();
                    }
                });

                gameArea.appendChild(info);
                gameArea.appendChild(targetDiv);
                gameArea.appendChild(slider);
                gameArea.appendChild(stopBtn);
                gameArea.appendChild(message);

                startMoving();
            }

            // ИГРА 4: Струп-тест
            function loadGame4() {
                const colors = ['red', 'green', 'blue', 'yellow'];
                const colorNames = ['КРАСНЫЙ', 'ЗЕЛЁНЫЙ', 'СИНИЙ', 'ЖЁЛТЫЙ'];
                const colorMap = {
                    'red': '#f44336',
                    'green': '#4caf50',
                    'blue': '#2196f3',
                    'yellow': '#ffeb3b'
                };

                let score = 0;
                const targetScore = 5;
                let gameFinished = false;

                const info = document.createElement('div');
                info.className = 'game-info';
                info.textContent = `Правильных подряд: ${score}/${targetScore}`;

                const message = document.createElement('div');
                message.className = 'message';

                const wordDisplay = document.createElement('div');
                wordDisplay.className = 'stroop-word';

                const buttonsContainer = document.createElement('div');
                buttonsContainer.className = 'stroop-colors';

                let currentInkColor = '';

                function generateNewWord() {
                    if (gameFinished) return;
                    const wordIndex = Math.floor(Math.random() * colorNames.length);
                    const word = colorNames[wordIndex];
                    const inkIndex = Math.floor(Math.random() * colors.length);
                    currentInkColor = colors[inkIndex];
                    wordDisplay.textContent = word;
                    wordDisplay.style.color = colorMap[currentInkColor];
                }

                colors.forEach(c => {
                    const btn = document.createElement('div');
                    btn.className = `color-btn ${c}`;
                    btn.dataset.color = c;
                    btn.addEventListener('click', () => {
                        if (gameFinished) return;
                        const chosenColor = btn.dataset.color;
                        if (chosenColor === currentInkColor) {
                            score++;
                            info.textContent = `Правильных подряд: ${score}/${targetScore}`;
                            if (score >= targetScore) {
                                gameFinished = true;
                                gamesCompleted[3] = true;
                                message.innerHTML = '🧠 Феноменальная внимательность!';
                                setTimeout(() => nextGame(), 1000);
                            } else {
                                generateNewWord();
                            }
                        } else {
                            score = 0;
                            info.textContent = `Правильных подряд: ${score}/${targetScore}`;
                            message.innerHTML = '❌ Не угадала цвет... Пробуй снова';
                            generateNewWord();
                        }
                    });
                    buttonsContainer.appendChild(btn);
                });

                gameArea.appendChild(info);
                gameArea.appendChild(wordDisplay);
                gameArea.appendChild(buttonsContainer);
                gameArea.appendChild(message);

                generateNewWord();
            }

            // ИГРА 5: Найди пару 5x4
            function loadGame5() {
                const symbols = ['🌹', '🌻', '🌸', '🌺', '🌼', '🌷', '💐', '🌿', '🍀', '🌾'];
                let cards = [];
                symbols.forEach(s => {
                    cards.push(s, s);
                });
                cards.sort(() => Math.random() - 0.5);

                let opened = [];
                let matched = 0;
                let lock = false;
                let gameFinished = false;

                const grid = document.createElement('div');
                grid.className = 'memory-grid-5x4';

                const info = document.createElement('div');
                info.className = 'game-info';
                info.textContent = 'Найди все пары (10 пар)';

                const message = document.createElement('div');
                message.className = 'message';

                function createCard(symbol, index) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.symbol = symbol;
                    card.dataset.index = index;

                    card.addEventListener('click', () => {
                        if (gameFinished || lock) return;
                        if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

                        card.classList.add('flipped');
                        card.textContent = symbol;

                        opened.push(card);

                        if (opened.length === 2) {
                            lock = true;
                            const card1 = opened[0];
                            const card2 = opened[1];

                            if (card1.dataset.symbol === card2.dataset.symbol) {
                                card1.classList.remove('flipped');
                                card1.classList.add('matched');
                                card2.classList.remove('flipped');
                                card2.classList.add('matched');
                                matched += 2;
                                opened = [];

                                if (matched === cards.length) {
                                    gameFinished = true;
                                    gamesCompleted[4] = true;
                                    message.innerHTML = '🧩 Все пары собраны!';
                                    setTimeout(() => nextGame(), 1000);
                                } else {
                                    lock = false;
                                }
                            } else {
                                setTimeout(() => {
                                    if (gameFinished) return;
                                    card1.classList.remove('flipped');
                                    card1.textContent = '';
                                    card2.classList.remove('flipped');
                                    card2.textContent = '';
                                    opened = [];
                                    lock = false;
                                }, 700);
                            }
                        }
                    });
                    return card;
                }

                cards.forEach((sym, idx) => {
                    const card = createCard(sym, idx);
                    grid.appendChild(card);
                });

                gameArea.appendChild(info);
                gameArea.appendChild(grid);
                gameArea.appendChild(message);
            }

            loadGame(0);
        })();
    </script>
</body>
</html>
